---
layout: default
---

<div class="x-book-toolbar">
  <div class="x-book-title">
    <a href="{{ '/' | relative_url }}">X 编程语言</a>
  </div>
  <div class="x-book-toolbar-right">
    <span class="x-book-label">文档</span>
  </div>
</div>

<div class="layout-with-sidebar x-book-shell">
  {% include sidebar.html %}

  <article class="post">
    <header class="post-header">
      <h1 class="post-title">{{ page.title | default: site.title | escape }}</h1>
    </header>

    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
