[section]
id = "lexical.basic"
name = "Basic lexical elements"
spec_chapter = "1"

[[case]]
name = "identifiers"
spec = ["x-keywords §1 variables"]
source = """
function main() {
  let hello = "world"
  let user_name = "Alice"
  let MAX_VALUE = 42
  let x123 = 100
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"

[[case]]
name = "numbers"
spec = ["x-expressions §3.1 literals"]
source = """
function main() {
  let integer = 42
  let float = 3.14
  let negative = -10
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"

[[case]]
name = "strings"
spec = ["x-expressions §3.1 literals"]
source = """
function main() {
  let double_quote = "world"
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"

[[case]]
name = "comments"
spec = ["x-expressions §3.5 comments"]
source = """
function main() {
  // single line comment
  let x = 10
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"

[[case]]
name = "operators"
spec = ["x-expressions §3.2 operators"]
source = """
function main() {
  let a = 1 + 2
  let b = 3 - 4
  let c = 5 * 6
  let d = 7 / 8
  let e = 9 % 10
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
