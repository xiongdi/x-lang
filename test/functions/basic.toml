[section]
id = "functions.basic"
name = "Basic functions"
spec_chapter = "5"

[[case]]
name = "function_definition"
spec = ["x-keywords §3 functions"]
source = """
function add(a: Integer, b: Integer) -> Integer = a + b

function main() {
  let result = add(1, 2)
  println(result)
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
  stdout = "3\n"

[[case]]
name = "multiline_function"
spec = ["x-keywords §3 functions"]
source = """
function multiply(a: Integer, b: Integer) -> Integer {
  let product = a * b
  product
}

function main() {
  let result = multiply(3, 4)
  println(result)
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
  stdout = "12\n"

[[case]]
name = "recursive_function"
spec = ["x-keywords §3 functions"]
source = """
function factorial(n: Integer) -> Integer {
  if n <= 1 {
    1
  } else {
    n * factorial(n - 1)
  }
}

function main() {
  let result = factorial(5)
  println(result)
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
  stdout = "120\n"

[[case]]
name = "function_shadowing"
spec = ["x-keywords §3 functions"]
source = """
function shadow() -> Integer {
  let x = 20
  x
}

function main() {
  let x = 10
  println(x)
  println(shadow())
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
  stdout = "10\n20\n"

[[case]]
name = "default_parameters"
spec = ["x-keywords §3 functions"]
source = """
function greet(name: String = "World") -> String {
  "Hello, " + name
}

function main() {
  println(greet())
  println(greet("Alice"))
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
  stdout = "Hello, World\nHello, Alice\n"

[[case]]
name = "lambda_function"
spec = ["x-keywords §3 functions"]
source = """
function main() {
  let add = (a: Integer, b: Integer) -> a + b
  let result = add(5, 6)
  println(result)
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
  stdout = "11\n"
