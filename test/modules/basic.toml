[section]
id = "modules.basic"
name = "Basic modules"
spec_chapter = "8"

[[case]]
name = "module_declaration"
spec = ["x-keywords §9 modules"]
source = """
module com.example.utils

function add(a: Integer, b: Integer) -> Integer = a + b

function main() {
  let result = add(1, 2)
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"

[[case]]
name = "export_statement"
spec = ["x-keywords §9 modules"]
source = """
module com.example.utils

export function add(a: Integer, b: Integer) -> Integer = a + b
export function subtract(a: Integer, b: Integer) -> Integer = a - b

function main() {
  let result1 = add(1, 2)
  let result2 = subtract(3, 1)
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"

[[case]]
name = "import_statement"
spec = ["x-keywords §9 modules"]
source = """
import com.example.utils.add
import com.example.utils.subtract as sub

function main() {
  let result1 = add(10, 5)
  let result2 = sub(10, 5)
  println(result1)
  println(result2)
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
  stdout = "15\n5\n"
