[section]
id = "statements.basic"
name = "Basic statements"
spec_chapter = "4"

[[case]]
name = "let_bindings"
spec = ["x-keywords §1 variables"]
source = """
function main() {
  let immutable = 42
  let mutable mutable_var = 10
  mutable_var = 20
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"

[[case]]
name = "const_bindings"
spec = ["x-keywords §1 variables"]
source = """
const MAX_VALUE: Integer = 100
const APP_NAME: String = "x-lang"

function main() {
  // Use constants
  let x = MAX_VALUE
  let name = APP_NAME
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"

[[case]]
name = "if_statement"
spec = ["x-keywords §4 control flow"]
source = """
function main() {
  let x = 10
  if x > 5 {
    println("x is greater than 5")
  } else {
    println("x is less or equal to 5")
  }
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
  stdout = "x is greater than 5\n"

[[case]]
name = "while_loop"
spec = ["x-keywords §4 control flow"]
source = """
function main() {
  let mutable i = 0
  while i < 5 {
    println(i)
    i += 1
  }
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
  stdout = "0\n1\n2\n3\n4\n"

[[case]]
name = "for_loop"
spec = ["x-keywords §4 control flow"]
source = """
function main() {
  for i in 0..5 {
    println(i)
  }
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
  stdout = "0\n1\n2\n3\n4\n"

[[case]]
name = "for_inclusive_loop"
spec = ["x-keywords §4 control flow"]
source = """
function main() {
  for i in 0..=3 {
    println(i)
  }
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
  stdout = "0\n1\n2\n3\n"

[[case]]
name = "return_statement"
spec = ["x-keywords §3 functions"]
source = """
function find_max(a: Integer, b: Integer) -> Integer {
  if a > b {
    return a
  }
  return b
}

function main() {
  let result = find_max(10, 20)
  println(result)
}
"""

  [case.expect]
  parse = "pass"
  run = "pass"
  stdout = "20\n"
