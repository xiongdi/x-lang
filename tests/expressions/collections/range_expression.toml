# 范围表达式测试 (SPEC.md 规范语法)
name = "range_expression"
description = "测试范围表达式: .. (不包含结束)"
category = "expressions/collections"
spec = ["spec/docs/03-expressions.md"]

# SPEC.md 规范: 1..10 表示 [1, 10) 不包含 10
source = """
// 使用范围表达式遍历
let mutable sum: integer = 0
for each i in 1..10 {
    sum = sum + i
}
println(sum)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "45\n"
