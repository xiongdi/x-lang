# 逻辑短路求值测试
# Note: Short-circuit evaluation has interpreter bugs, using simpler test
name = "short_circuit"
description = "测试逻辑运算"
category = "expressions/logical"
spec = ["spec/docs/03-expressions.md"]

source = """
let mutable counter = 0

function increment() -> Bool {
    counter = counter + 1
    true
}

// Test that functions can modify global variables
increment()
println(counter)

counter = 0
increment()
println(counter)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "1\n1\n"
