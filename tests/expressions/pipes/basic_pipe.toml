# 管道表达式测试
name = "basic_pipe"
description = "测试管道运算符 |>"
category = "expressions/pipes"
spec = ["spec/docs/03-expressions.md"]

source = """
function double(x: Int) -> Int = x * 2
function add_one(x: Int) -> Int = x + 1

let result = 5 |> double |> add_one
println(result)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "11\n"
