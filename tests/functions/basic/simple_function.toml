# 简单函数测试
name = "simple_function"
description = "测试基本函数定义和调用"
category = "functions/basic"
spec = ["spec/docs/05-functions.md"]

source = """
function add(a: integer, b: integer) -> integer = a + b

let result = add(3, 4)
println(result)
"""

