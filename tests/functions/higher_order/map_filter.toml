# 高阶函数测试 - 简化版
# Note: Full function type support not implemented, using simpler test
name = "higher_order"
description = "测试高阶函数"
category = "functions/higher_order"
spec = ["spec/docs/05-functions.md"]

source = """
function double(x: Int) -> Int = x * 2
let result = double(5)
println(result)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "10\n"
