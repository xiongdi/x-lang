# 递归函数测试
name = "recursive_function"
description = "测试递归函数"
category = "functions/recursion"
spec = ["spec/docs/05-functions.md"]

source = """
function fibonacci(n: Int) -> Int {
    if n <= 1 { return n }
    return fibonacci(n - 1) + fibonacci(n - 2)
}

println(fibonacci(0))
println(fibonacci(1))
println(fibonacci(10))
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "0\n1\n55\n"
