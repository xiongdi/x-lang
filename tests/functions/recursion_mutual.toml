# 相互递归函数测试
name = "mutual_recursion"
description = "测试相互递归函数"
category = "functions/recursion"
spec = ["spec/docs/05-functions.md"]

source = """
// 相互递归
function is_even(n: integer) -> bool {
    if n == 0 { return true }
    is_odd(n - 1)
}

function is_odd(n: integer) -> bool {
    if n == 0 { return false }
    is_even(n - 1)
}

println(is_even(10))  // true
println(is_even(7))   // false
println(is_odd(10))   // false
println(is_odd(7))    // true
"""

[expect]
compile = true

[expect.runtime]
output_contains = ["true", "false", "false", "true"]
