# 注释测试
name = "comments_test"
description = "测试单行注释"
category = "lexical/comments"
spec = ["spec/docs/01-lexical.md"]

# Note: Multi-line comments /* */ are not yet implemented
# Only single-line comments // are supported

source = """
// single line comment
let x: Int = 42

function greet(name: String) {
    // comment in function
    println(name)
}

greet("World")
println(x)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "World\n42\n"

[expect.tokens]
contains = ["Let", "Function"]
