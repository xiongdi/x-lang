# 整数字面量测试
name = "integer_literals"
description = "测试整数字面量: 十进制整数、大整数、负数"
category = "lexical/literals"
spec = ["spec/docs/01-lexical.md"]

source = """
let decimal = 42
let large = 1000000
let negative = -10
let zero = 0

println(decimal)
println(large)
println(negative)
println(zero)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "42\n1000000\n-10\n0\n"

[expect.tokens]
contains = ["DecimalInt"]
