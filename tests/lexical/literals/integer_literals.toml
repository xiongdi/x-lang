# 整数字面量测试
name = "integer_literals"
description = "测试各种进制的整数字面量: 十进制、十六进制、八进制、二进制"
category = "lexical/literals"
spec = ["spec/docs/01-lexical.md"]

source = """
let decimal = 42
let large = 1_000_000
let hex = 0xFF
let octal = 0o755
let binary = 0b1010_1100
println(decimal)
println(hex)
"""

[expect]
compile = true
exit_code = 0

[expect.tokens]
contains = ["DecimalInt", "HexInt", "OctInt", "BinInt"]
