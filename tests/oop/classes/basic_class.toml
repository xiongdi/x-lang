# 类定义测试
name = "basic_class"
description = "测试类定义和实例化"
category = "oop/classes"
spec = ["spec/docs/06-classes.md"]

source = """
class Person {
    name: string
    age: integer

    greet() {
        println(self.name)
    }

    get_age() -> integer {
        return self.age
    }
}

let p = Person("Alice", 30)
p.greet()
let age = p.get_age()
println(age)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "Alice\n30\n"
