# Option 模式匹配测试 (按照 SPEC.md 规范)
name = "option_pattern"
description = "测试 Optional 类型的模式匹配"
category = "patterns/constructors"
spec = ["SPEC.md"]

# SPEC.md 规范: 模式匹配 on Optional
source = """
// 定义 Optional 枚举
enum Optional<T> {
    Some(T),
    None
}

// 创建数组
let items = [1, 2, 3]

// 使用 Some
let result = Optional.Some(42)

// 模式匹配
when result is {
    Optional.Some(v) => println(v)
    Optional.None => println("none")
}
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "42\n"