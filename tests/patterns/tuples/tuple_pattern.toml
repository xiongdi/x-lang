# 元组模式测试
# SPEC.md 规范: 元组字面量使用圆括号，至少两个元素
name = "tuple_pattern"
description = "测试元组字面量"
category = "patterns/tuples"
spec = ["spec/docs/09-patterns.md"]

source = """
// 元组字面量 - SPEC.md 规范语法
let point = (10, 20)
let person = ("Alice", 30, true)

println(point)
println(person)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "[10, 20]\n[Alice, 30, true]\n"
