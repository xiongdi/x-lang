# 通配符模式测试
name = "wildcard_pattern"
description = "测试通配符 _ 模式"
category = "patterns/wildcards"
spec = ["spec/docs/09-patterns.md"]

source = """
let n: Int = 42

match n {
    0 => println("zero")
    1 => println("one")
    _ => println("other")
}
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "other\n"
