[[tests]]
name = "function_type"
source = """
function apply(f: function(integer) -> integer, x: integer) -> integer {
    f(x)
}

function double(n: integer) -> integer {
    n * 2
}

println(apply(double, 21))
"""
stdout = "42\n"
category = "types"
tags = ["function-type", "higher-order"]
spec = ["02-types"]

