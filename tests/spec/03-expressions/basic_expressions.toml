[[tests]]
name = "pipeline_operator"
source = """
function double(x: integer) -> integer {
    x * 2
}

function add_one(x: integer) -> integer {
    x + 1
}

let result = 5 |> double |> add_one
println(result)
"""
stdout = "11\n"
category = "expressions"
tags = ["pipeline"]
spec = ["03-expressions"]

[[tests]]
name = "null_coalescing"
source = """
import std.types.{Option, Some, None}

let x: Option<integer> = None
let y = x ?? 0
println(y)
"""
stdout = "0\n"
category = "expressions"
tags = ["option", "null-coalescing"]
spec = ["03-expressions"]

[[tests]]
name = "optional_chaining"
source = """
import std.types.{Option, Some, None}

record Person {
    name: string,
    age: Option<integer>
}

let p = Person { name: "Alice", age: Some(30) }
let age = p?.age
println("ok")
"""
stdout = "ok\n"
category = "expressions"
tags = ["option", "optional-chaining"]
spec = ["03-expressions"]

[[tests]]
name = "range_exclusive"
source = """
let sum = 0
for i in 1..5 {
    sum = sum + i
}
println(sum)
"""
stdout = "10\n"
category = "expressions"
tags = ["range"]
spec = ["03-expressions"]

[[tests]]
name = "range_inclusive"
source = """
let sum = 0
for i in 1..=5 {
    sum = sum + i
}
println(sum)
"""
stdout = "15\n"
category = "expressions"
tags = ["range", "inclusive"]
spec = ["03-expressions"]

