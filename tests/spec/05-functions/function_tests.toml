[[tests]]
name = "function_recursive"
source = """
function factorial(n: integer) -> integer {
    if n <= 1 {
        1
    } else {
        n * factorial(n - 1)
    }
}

println(factorial(5))
"""
stdout = "120\n"
category = "functions"
tags = ["recursion"]
spec = ["05-functions"]

[[tests]]
name = "function_mutual_recursive"
source = """
function is_even(n: integer) -> boolean {
    if n == 0 {
        true
    } else {
        is_odd(n - 1)
    }
}

function is_odd(n: integer) -> boolean {
    if n == 0 {
        false
    } else {
        is_even(n - 1)
    }
}

println(is_even(4))
println(is_odd(5))
"""
stdout = "true\ntrue\n"
category = "functions"
tags = ["recursion", "mutual"]
spec = ["05-functions"]

