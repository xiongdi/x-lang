[[tests]]
name = "pattern_binding"
source = """
import std.types.{Option, Some, None}

let x: Option<integer> = Some(42)
match x {
    Some(value @ n) if n > 40 => println(n),
    _ => println("other")
}
"""
stdout = "42\n"
category = "patterns"
tags = ["match", "binding", "at-operator"]
spec = ["09-patterns"]
