[[tests]]
name = "match_nested"
source = """
import std.types.{Option, Some, None}

let nested: Option<Option<integer>> = Some(Some(42))
match nested {
    Some(Some(value)) => println(value),
    Some(None) => println("inner none"),
    None => println("outer none")
}
"""
stdout = "42\n"
category = "patterns"
tags = ["match", "nested", "option"]
spec = ["09-patterns"]

[[tests]]
name = "match_enum_all_variants"
source = """
enum Color {
    Red,
    Green,
    Blue,
    RGB(integer, integer, integer)
}

let c = Color.RGB(255, 128, 0)
match c {
    Color.Red => println("red"),
    Color.Green => println("green"),
    Color.Blue => println("blue"),
    Color.RGB(r, g, b) => println("custom")
}
"""
stdout = "custom\n"
category = "patterns"
tags = ["match", "enum"]
spec = ["09-patterns"]

[[tests]]
name = "match_exhaustive_check"
source = """
import std.types.{Option, Some, None}

function unwrap<T>(opt: Option<T>) -> T {
    match opt {
        Some(value) => value
    }
}
"""
compile_fail = true
error_contains = "non-exhaustive"
category = "patterns"
tags = ["match", "exhaustiveness", "error"]
spec = ["09-patterns"]

