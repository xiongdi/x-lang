match x {
    true => println("yes"),
    false => println("no")
}
"""
stdout = "yes\n"
category = "patterns"
tags = ["match", "boolean"]
spec = ["09-patterns"]

[[tests]]
name = "match_option"
source = """
import std.types.{Option, Some, None}

let x: Option<integer> = Some(42)
match x {
    Some(value) => println(value),
    None => println("none")
}
"""
stdout = "42\n"
category = "patterns"
tags = ["match", "option", "enum"]
spec = ["09-patterns"]

