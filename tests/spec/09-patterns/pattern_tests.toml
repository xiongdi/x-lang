name = "match_int"
source = """
let x = 2
match x {
    1 => println("one"),
    2 => println("two"),
    3 => println("three"),
    _ => println("other")
}
"""
stdout = "two\n"
category = "patterns"
tags = ["match", "literal"]
spec = ["09-patterns"]

[[tests]]
name = "match_bool"
source = """
