[[tests]]
name = "match_guard"
source = """
let x = 5
match x {
    n if n > 10 => println("big"),
    n if n > 5 => println("medium"),
    _ => println("small")
}
"""
stdout = "small\n"
category = "patterns"
tags = ["match", "guard"]
spec = ["09-patterns"]

