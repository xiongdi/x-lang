# 复合赋值测试 (SPEC.md 规范)
name = "compound_assignment"
description = "测试复合赋值运算符: +=, -=, *=, /=, %="
category = "statements/assignments"
spec = ["spec/docs/04-statements.md"]

# SPEC.md 规范: 复合赋值运算符
# +=, -=, *=, /=, %=, ^=, &=, |=, <<=, >>=
# Note: Bitwise compound assignments (&=, |=, ^=, <<=, >>=) have type checker issues
source = """
let mutable a: integer = 10
a += 5
println(a)

let mutable b: integer = 20
b -= 8
println(b)

let mutable c: integer = 5
c *= 4
println(c)

let mutable d: integer = 100
d /= 4
println(d)

let mutable e: integer = 10
e %= 3
println(e)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "15\n12\n20\n25\n1\n"
