# 嵌套控制流测试
name = "nested_control_flow"
description = "测试嵌套的控制流语句"
category = "statements/control_flow"
spec = ["spec/docs/04-statements.md"]

source = """
let mutable result: Int = 0
let i: Int = 1

while i <= 3 {
    let j: Int = 1
    while j <= 3 {
        if i == j {
            result = result + i * 10
        } else {
            result = result + 1
        }
        j = j + 1
    }
    i = i + 1
}

println(result)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "66\n"
