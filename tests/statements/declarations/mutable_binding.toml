# 可变绑定测试
name = "mutable_binding"
description = "测试 mutable 可变绑定"
category = "statements/declarations"
spec = ["spec/docs/04-statements.md"]

source = """
let mutable counter = 0
println(counter)

counter = counter + 1
println(counter)

counter = counter + 10
println(counter)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "0\n1\n11\n"
