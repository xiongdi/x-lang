# While 孃ょ렞役뗨캊
name = "while_loop"
description = "役뗨캊 while 孃ょ렞"
category = "statements/loops"
spec = ["spec/docs/04-statements.md"]

source = """
let mutable i = 0
let mutable sum = 0

while i < 10 {
    sum = sum + i
    i = i + 1
}
println(sum)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "45\n"
