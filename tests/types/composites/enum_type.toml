# 枚举类型测试 (按照 SPEC.md 规范)
name = "enum_type"
description = "测试枚举类型定义和模式匹配"
category = "types/composites"
spec = ["SPEC.md"]

# SPEC.md 规范: enum 枚举定义
source = """
// 定义颜色枚举
enum Color {
    Red,
    Green,
    Blue
}

// 定义状态枚举
enum Status {
    Pending,
    Active,
    Completed
}

// 使用枚举变体
let c = Color.Red
let s = Status.Pending

// 测试模式匹配
when c is {
    Color.Red => println("red")
    Color.Green => println("green")
    Color.Blue => println("blue")
}

when s is {
    Status.Pending => println("pending")
    Status.Active => println("active")
    Status.Completed => println("completed")
}
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = """red
pending
"""