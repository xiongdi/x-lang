# Option 类型测试
# Note: Option<T> type with Some/None constructors not fully implemented
# The compiler does not yet support algebraic data types
name = "option_type"
description = "测试 Option<T> 类型（占位测试）"
category = "types/composites"
spec = ["spec/docs/02-types.md"]

# TODO: When Option types are implemented, test:
