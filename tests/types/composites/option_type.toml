# Option 类型测试 (按照 SPEC.md 规范)
name = "option_type"
description = "测试 Optional<T> 类型和 Some/None 构造器"
category = "types/composites"
spec = ["SPEC.md"]

# 完整的 Optional<T> 测试 - 使用 SPEC.md 规范语法
source = """
// 定义 Optional<T> 枚举 (符合 SPEC.md)
enum Optional<T> {
    Some(T),
    None
}

// 测试 Some 构造器
let a = Optional.Some(42)

// 测试 None 构造器
let b = Optional.None

// 测试模式匹配 - 使用完全限定名
when a is {
    Optional.Some(v) => println(v)
    Optional.None => println("none")
}

// 测试 Optional 作为函数返回值
function safe_divide(a: Int, b: Int) -> Optional<Int> {
    if b == 0 {
        return Optional.None
    }
    Optional.Some(a / b)
}

let result = safe_divide(10, 2)
when result is {
    Optional.Some(v) => println(v)
    Optional.None => println("div by zero")
}
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = """42
5
"""