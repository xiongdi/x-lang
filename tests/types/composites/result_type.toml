# Result 类型测试 (按照 SPEC.md 规范)
name = "result_type"
description = "测试 Result<T, E> 类型和 Success/Failure 构造器"
category = "types/composites"
spec = ["SPEC.md"]

# 完整的 Result<T, E> 测试 - 使用 SPEC.md 规范语法
source = """
// 定义 Result<T, E> 枚举 (符合 SPEC.md)
enum Result<T, E> {
    Success(T),
    Failure(E)
}

// 测试 Success 构造器
let a = Result.Success(42)

// 测试模式匹配 - 使用完全限定名
when a is {
    Result.Success(v) => println(v)
    Result.Failure(e) => println(e)
}
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "42\n"