# 泛型类型测试 (按照 SPEC.md 规范)
name = "generic_type"
description = "测试泛型类型推断"
category = "types/generics"
spec = ["SPEC.md"]

# SPEC.md 规范: 泛型函数 <T>
source = """
// 泛型 identity 函数 - 使用类型推断
function identity<T>(x: T) -> T = x

let num = identity(42)
println(num)
"""

[expect]
compile = true
exit_code = 0

[expect.runtime]
output = "42\n"