# Option/Result 方法测试
name = "option_result_methods"
description = "测试 Option/Result 基本使用"
category = "types"
spec = ["spec/docs/09-patterns.md"]

source = """
// 测试 Option 基本使用 - 使用模式匹配
// 不指定类型，让类型检查器自动推断
let opt = Some(42)

// 测试模式匹配 - Some 有参数，None 无参数
when opt is {
    Some(v) => println(v)
    None => println("none")
}

// 测试 Result 基本使用
let ok_res = Ok(100)
let err_res = Err("error")

when ok_res is {
    Ok(v) => println(v)
    Err(e) => println(e)
}

when err_res is {
    Ok(v) => println(v)
    Err(e) => println(e)
}
"""

[expect]
compile = true

[expect.runtime]
output_contains = ["42", "100", "error"]