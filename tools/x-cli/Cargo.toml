[package]
name = "x-cli"
version = "0.1.0"
edition = "2021"
description = "X语言命令行工具"
license = "MIT"

default-run = "x"

[features]
default = []
codegen = ["x-codegen"]

[dependencies]
# Pipeline crates
x-lexer = { path = "../../compiler/x-lexer" }
x-parser = { path = "../../compiler/x-parser" }
x-typechecker = { path = "../../compiler/x-typechecker" }
x-hir = { path = "../../compiler/x-hir" }
x-perceus = { path = "../../compiler/x-perceus" }
x-codegen = { path = "../../compiler/x-codegen", optional = true }
x-interpreter = { path = "../../compiler/x-interpreter" }

# CLI
clap = { version = "4.5", features = ["derive"] }
colored = "2.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
toml_edit = "0.22"

# Versioning
semver = { version = "1.0", features = ["serde"] }

# File system
dirs = "5.0"
walkdir = "2"

# Packaging
flate2 = "1.0"
tar = "0.4"

# Error handling
thiserror = "1.0"

# Logging
log = "0.4"
env_logger = "0.10"

[[bin]]
name = "x"
path = "src/main.rs"
