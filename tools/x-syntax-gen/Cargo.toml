[package]
name = "x-syntax-gen"
version = "0.1.0"
edition = "2021"
description = "X Language Syntax Highlight Generator"
license = "MIT OR Apache-2.0 OR BSD-3-Clause"

[dependencies]
# Template engine
handlebars = "4.5.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# CLI
clap = { version = "4.4", features = ["derive"] }

# Compiler crates
x-lexer = { path = "../../compiler/x-lexer" }

# Utilities
anyhow = "1.0"
walkdir = "2.4"
regex = "1.10"
